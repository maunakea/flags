<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flags</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#127937;</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    background: #14161a;
    color: #f2f3f5;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  input {
    user-select: text;
    -webkit-user-select: text;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px 0;
    gap: 12px;
  }

  #scores { display: flex; flex-direction: column; gap: 6px; min-width: 128px; }

  .chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #c9cdd3;
    background: #1f2329;
    border-left: 3px solid var(--c);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .chip b { color: #fff; font-size: 15px; font-variant-numeric: tabular-nums; }

  #counter {
    font-size: 14px;
    font-weight: 600;
    color: #c9cdd3;
    background: #1f2329;
    border-radius: 6px;
    padding: 4px 10px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 20px;
    padding: 3dvh 16px 12px;
    min-height: 0;
  }

  /* Fixed-size slot so the flag keeps the same size and position in every phase */
  #flagWrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 440px;
    height: 34dvh;
    flex: 0 0 auto;
  }

  /* Every flag is stretched to the same full-width 5:3 box (the Minnesota flag's shape) */
  #flagImg {
    width: 100%;
    aspect-ratio: 5 / 3;
    max-height: 100%;
    object-fit: fill;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.55);
    opacity: 0;
    transition: opacity .25s ease;
  }
  #flagImg.loaded { opacity: 1; }

  #tapHint {
    font-size: 17px;
    font-weight: 500;
    color: #9aa1ab;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .45 } 50% { opacity: 1 } }

  .panel {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #stateName {
    font-size: clamp(26px, 7vw, 40px);
    font-weight: 700;
    letter-spacing: .3px;
    text-align: center;
  }

  .prow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: #1f2329;
    border-radius: 12px;
    padding: 10px 14px;
    gap: 12px;
  }
  .prow .pname {
    font-size: 16px;
    font-weight: 600;
    border-left: 3px solid var(--c);
    padding-left: 10px;
  }
  .prow .btns { display: flex; gap: 10px; }
  .prow button {
    font: inherit;
    font-size: 20px;
    font-weight: 700;
    width: 56px;
    height: 44px;
    border-radius: 10px;
    border: 1.5px solid #3a4048;
    background: transparent;
    color: #e7e9ec;
    cursor: pointer;
  }
  .prow button.right.sel { background: #1f7a3d; border-color: #1f7a3d; }
  .prow button.wrong.sel { background: #a13333; border-color: #a13333; }
  .prow button.dim { opacity: .3; }
  .prow button:disabled { cursor: default; }

  .srow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #1f2329;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px;
    font-weight: 600;
  }
  .srow .pname { border-left: 3px solid var(--c); padding-left: 10px; }
  .srow .tot { font-size: 18px; font-variant-numeric: tabular-nums; }

  .hint { font-size: 14px; color: #9aa1ab; }

  h2 { font-size: 22px; font-weight: 700; }

  #players, #finalScores { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  /* 4-player games compact the layout so every guess row stays on screen
     (the page is fixed and cannot scroll) */
  body.compact #scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-width: 0;
  }
  body.compact .chip { font-size: 13px; white-space: nowrap; }
  body.compact #flagWrap { height: 28dvh; }
  body.compact main { gap: 14px; }
  body.compact #players { gap: 8px; }
  body.compact .prow { padding: 6px 12px; }
  body.compact .prow button { width: 52px; height: 38px; }
  body.compact #stateName { font-size: clamp(22px, 6vw, 32px); }

  #setupPanel { margin-top: 4dvh; gap: 18px; }

  #modeToggle {
    display: flex;
    width: 100%;
    background: #1f2329;
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  #modeToggle button {
    flex: 1;
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 0;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: #9aa1ab;
    cursor: pointer;
  }
  #modeToggle button.sel { background: #2e3742; color: #fff; }

  #nameFields { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  .nameInput {
    width: 100%;
    font: inherit;
    font-size: 16px;
    font-weight: 600;
    color: #f2f3f5;
    background: #1f2329;
    border: none;
    border-left: 3px solid var(--c);
    border-radius: 12px;
    padding: 12px 14px;
    outline: none;
  }
  .nameInput::placeholder { color: #5c636d; font-weight: 500; }
  .nameInput:focus { box-shadow: 0 0 0 2px #2e3742; }

  .setupField {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: #1f2329;
    border-radius: 12px;
    padding: 10px 14px;
  }
  .setupField label { font-size: 16px; font-weight: 600; color: #c9cdd3; }
  #timerInput {
    width: 76px;
    text-align: center;
    font: inherit;
    font-size: 16px;
    font-weight: 600;
    color: #f2f3f5;
    background: #14161a;
    border: 1.5px solid #3a4048;
    border-radius: 10px;
    padding: 8px 4px;
    outline: none;
  }
  #timerInput:focus { border-color: #4da3ff; }

  #startBtn {
    width: 100%;
    font: inherit;
    font-size: 17px;
    font-weight: 700;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #1f7a3d;
    color: #fff;
    cursor: pointer;
  }
  #startBtn:active { background: #25914a; }

  #timerBar {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: calc(4px + env(safe-area-inset-bottom));
    background: #23272e;
  }
  #timerFill {
    height: 100%;
    width: 100%;
    background: #4da3ff;
    transform-origin: left;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header id="gameHeader" class="hidden">
  <div id="scores"></div>
  <div id="counter">0 / 50</div>
</header>

<main>
  <section id="setupPanel" class="panel">
    <h2>&#127937; Flags</h2>
    <div id="modeToggle">
      <button type="button" data-mode="states" class="sel">US States</button>
      <button type="button" data-mode="fifa">World Cup 2026</button>
    </div>
    <div id="nameFields">
      <input class="nameInput" style="--c:#4da3ff" placeholder="Player 1" value="Vincy" maxlength="14" autocomplete="off" enterkeyhint="go">
      <input class="nameInput" style="--c:#ffb454" placeholder="Player 2" value="Cupcake" maxlength="14" autocomplete="off" enterkeyhint="go">
      <input class="nameInput" style="--c:#6fd68b" placeholder="Player 3" value="Angel" maxlength="14" autocomplete="off" enterkeyhint="go">
      <input class="nameInput" style="--c:#c58bf2" placeholder="Player 4" maxlength="14" autocomplete="off" enterkeyhint="go">
    </div>
    <div class="setupField">
      <label for="timerInput">Timer (seconds)</label>
      <input id="timerInput" type="number" inputmode="numeric" min="1" max="300" step="1" value="15">
    </div>
    <button id="startBtn" type="button">Start game</button>
    <div id="setupHint" class="hint hidden">Enter at least one player name</div>
  </section>

  <div id="flagWrap" class="hidden"><img id="flagImg" alt="Flag" draggable="false"></div>

  <div id="tapHint" class="hidden">Tap to reveal</div>

  <section id="revealPanel" class="panel hidden">
    <h1 id="stateName"></h1>
    <div id="players"></div>
  </section>

  <section id="finalPanel" class="panel hidden">
    <h2>Final scores</h2>
    <div id="finalScores"></div>
    <div class="hint">Reload the page to play again</div>
  </section>
</main>

<div id="timerBar" class="hidden"><div id="timerFill"></div></div>

<script>
"use strict";

const STATES = [
  ["Alabama","us-al"],["Alaska","us-ak"],["Arizona","us-az"],["Arkansas","us-ar"],
  ["California","us-ca"],["Colorado","us-co"],["Connecticut","us-ct"],["Delaware","us-de"],
  ["Florida","us-fl"],["Georgia","us-ga"],["Hawaii","us-hi"],["Idaho","us-id"],
  ["Illinois","us-il"],["Indiana","us-in"],["Iowa","us-ia"],["Kansas","us-ks"],
  ["Kentucky","us-ky"],["Louisiana","us-la"],["Maine","us-me"],["Maryland","us-md"],
  ["Massachusetts","us-ma"],["Michigan","us-mi"],["Minnesota","us-mn"],["Mississippi","us-ms"],
  ["Missouri","us-mo"],["Montana","us-mt"],["Nebraska","us-ne"],["Nevada","us-nv"],
  ["New Hampshire","us-nh"],["New Jersey","us-nj"],["New Mexico","us-nm"],["New York","us-ny"],
  ["North Carolina","us-nc"],["North Dakota","us-nd"],["Ohio","us-oh"],["Oklahoma","us-ok"],
  ["Oregon","us-or"],["Pennsylvania","us-pa"],["Rhode Island","us-ri"],["South Carolina","us-sc"],
  ["South Dakota","us-sd"],["Tennessee","us-tn"],["Texas","us-tx"],["Utah","us-ut"],
  ["Vermont","us-vt"],["Virginia","us-va"],["Washington","us-wa"],["West Virginia","us-wv"],
  ["Wisconsin","us-wi"],["Wyoming","us-wy"]
];

// The 48 nations qualified for the 2026 FIFA World Cup.
const COUNTRIES = [
  ["Algeria","dz"],["Argentina","ar"],["Australia","au"],["Austria","at"],
  ["Belgium","be"],["Bosnia & Herzegovina","ba"],["Brazil","br"],["Canada","ca"],
  ["Cape Verde","cv"],["Colombia","co"],["Croatia","hr"],["Curaçao","cw"],
  ["Czechia","cz"],["DR Congo","cd"],["Ecuador","ec"],["Egypt","eg"],
  ["England","gb-eng"],["France","fr"],["Germany","de"],["Ghana","gh"],
  ["Haiti","ht"],["Iran","ir"],["Iraq","iq"],["Ivory Coast","ci"],
  ["Japan","jp"],["Jordan","jo"],["Mexico","mx"],["Morocco","ma"],
  ["Netherlands","nl"],["New Zealand","nz"],["Norway","no"],["Panama","pa"],
  ["Paraguay","py"],["Portugal","pt"],["Qatar","qa"],["Saudi Arabia","sa"],
  ["Scotland","gb-sct"],["Senegal","sn"],["South Africa","za"],["South Korea","kr"],
  ["Spain","es"],["Sweden","se"],["Switzerland","ch"],["Tunisia","tn"],
  ["Türkiye","tr"],["United States","us"],["Uruguay","uy"],["Uzbekistan","uz"]
];

const COLORS = ["#4da3ff", "#ffb454", "#6fd68b", "#c58bf2"];

let PLAYERS = [];
let DECK = STATES;
let TIMER_MS = 15000;
let order = [];
let totals = [];
let started = false;
let mode = "states";

const flagUrl = code => `https://flagcdn.com/w1280/${code}.png`;

const history = [];   // rounds: {idx, phase, guesses, endsAt}
let cur = -1;
let finalShown = false;

const $ = id => document.getElementById(id);
const els = {
  header: $("gameHeader"), scores: $("scores"), counter: $("counter"),
  flagWrap: $("flagWrap"), flagImg: $("flagImg"),
  tapHint: $("tapHint"), revealPanel: $("revealPanel"), stateName: $("stateName"),
  players: $("players"), finalPanel: $("finalPanel"), finalScores: $("finalScores"),
  timerBar: $("timerBar"), timerFill: $("timerFill"),
  setupPanel: $("setupPanel"), modeToggle: $("modeToggle"),
  timerInput: $("timerInput"), startBtn: $("startBtn"), setupHint: $("setupHint"),
};

els.flagImg.addEventListener("load", () => els.flagImg.classList.add("loaded"));

function renderScores() {
  els.scores.innerHTML = PLAYERS.map((p, i) =>
    `<span class="chip" style="--c:${COLORS[i]}">${p} <b>${totals[i]}</b></span>`
  ).join("");
}

function renderCounter() {
  els.counter.textContent = `${history.length} / ${DECK.length}`;
}

function newRound() {
  history.push({
    idx: order[history.length],
    phase: "timer",
    guesses: PLAYERS.map(() => null),
    endsAt: Date.now() + TIMER_MS,
  });
  cur = history.length - 1;
  if (history.length < order.length) {
    new Image().src = flagUrl(DECK[order[history.length]][1]); // preload next
  }
  render();
}

function enterRound() {
  const r = history[cur];
  if (r.phase === "timer") r.endsAt = Date.now() + TIMER_MS;
  render();
}

function nextFlag() {
  if (!started || finalShown) return;
  if (cur < history.length - 1) { cur++; enterRound(); return; }
  if (history.length < order.length) { newRound(); return; }
  if (history[cur].phase === "reveal") { finalShown = true; render(); }
}

function prevFlag() {
  if (!started) return;
  if (finalShown) { finalShown = false; render(); return; }
  if (cur > 0) { cur--; enterRound(); }
}

// Guesses stay editable so responses on a previous flag can be corrected.
function setGuess(p, correct) {
  const r = history[cur];
  if (!r || r.phase !== "reveal" || r.guesses[p] === correct) return;
  if (r.guesses[p] === true) totals[p]--;
  if (correct) totals[p]++;
  r.guesses[p] = correct;
  renderScores();
  renderPlayers(r);
}

function renderPlayers(r) {
  els.players.innerHTML = PLAYERS.map((p, i) => {
    const g = r.guesses[i];
    const cls = (btn, val) =>
      `${btn}${g === null ? "" : (g === val ? " sel" : " dim")}`;
    return `<div class="prow" style="--c:${COLORS[i]}">
      <span class="pname">${p}</span>
      <span class="btns">
        <button class="${cls("right", true)}" data-p="${i}" data-v="1">&#10003;</button>
        <button class="${cls("wrong", false)}" data-p="${i}" data-v="0">&#10007;</button>
      </span>
    </div>`;
  }).join("");
}

function renderFinalScores() {
  const best = Math.max(...totals);
  els.finalScores.innerHTML = PLAYERS
    .map((p, i) => ({ p, i, s: totals[i] }))
    .sort((a, b) => b.s - a.s)
    .map(({ p, i, s }) =>
      `<div class="srow" style="--c:${COLORS[i]}">
        <span class="pname">${p}${s === best ? " &#127942;" : ""}</span>
        <span class="tot">${s}</span>
      </div>`
    ).join("");
}

function render() {
  renderScores();
  renderCounter();

  if (finalShown) {
    els.flagWrap.classList.add("hidden");
    els.tapHint.classList.add("hidden");
    els.revealPanel.classList.add("hidden");
    els.timerBar.classList.add("hidden");
    renderFinalScores();
    els.finalPanel.classList.remove("hidden");
    return;
  }
  els.finalPanel.classList.add("hidden");
  els.flagWrap.classList.remove("hidden");

  const r = history[cur];
  if (!r) return;

  const url = flagUrl(DECK[r.idx][1]);
  if (!els.flagImg.src.endsWith(`/${DECK[r.idx][1]}.png`)) {
    els.flagImg.classList.remove("loaded");
    els.flagImg.src = url;
  }

  const name = DECK[r.idx][0];
  els.timerBar.classList.toggle("hidden", r.phase !== "timer");
  els.tapHint.classList.toggle("hidden", r.phase !== "paused");

  if (r.phase === "reveal") {
    els.stateName.textContent = name;
    renderPlayers(r);
    els.revealPanel.classList.remove("hidden");
  } else {
    els.revealPanel.classList.add("hidden");
  }
}

function handleTap() {
  const r = history[cur];
  if (!started || finalShown || !r) return;
  if (r.phase === "paused") { r.phase = "reveal"; render(); }
}

// --- setup screen ---
els.modeToggle.addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  mode = btn.dataset.mode;
  for (const b of els.modeToggle.children) b.classList.toggle("sel", b === btn);
});

function startGame() {
  const names = [...document.querySelectorAll(".nameInput")]
    .map(i => i.value.trim())
    .filter(Boolean)
    .slice(0, 4);
  if (!names.length) {
    els.setupHint.classList.remove("hidden");
    return;
  }
  PLAYERS = names;
  const secs = parseFloat(els.timerInput.value);
  TIMER_MS = (secs >= 1 && secs <= 300 ? secs : 15) * 1000;
  DECK = mode === "fifa" ? COUNTRIES : STATES;

  // Pre-shuffled draw order guarantees no repeats until the whole deck is shown.
  order = [...DECK.keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  totals = PLAYERS.map(() => 0);

  started = true;
  document.body.classList.toggle("compact", PLAYERS.length === 4);
  els.setupPanel.classList.add("hidden");
  els.header.classList.remove("hidden");
  els.flagWrap.classList.remove("hidden");
  newRound();
}

// Confirm before leaving mid-game so an accidental reload doesn't wipe the scores.
window.addEventListener("beforeunload", e => {
  if (started && !finalShown) { e.preventDefault(); e.returnValue = ""; }
});

els.startBtn.addEventListener("click", startGame);
els.setupPanel.addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); startGame(); }
});

// --- timer loop ---
(function tick() {
  const r = history[cur];
  if (started && r && r.phase === "timer" && !finalShown) {
    const left = Math.max(0, r.endsAt - Date.now());
    els.timerFill.style.transform = `scaleX(${left / TIMER_MS})`;
    if (left <= 0) { r.phase = "paused"; render(); }
  }
  requestAnimationFrame(tick);
})();

// --- input: swipe vs tap ---
let pStart = null;
document.addEventListener("pointerdown", e => {
  pStart = { x: e.clientX, y: e.clientY };
});
document.addEventListener("pointerup", e => {
  if (!pStart || !started) { pStart = null; return; }
  const dx = e.clientX - pStart.x, dy = e.clientY - pStart.y;
  pStart = null;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextFlag(); else prevFlag();
    return;
  }
  if (Math.abs(dx) < 12 && Math.abs(dy) < 12 && !e.target.closest("button")) {
    handleTap();
  }
});
document.addEventListener("pointercancel", () => { pStart = null; });

els.players.addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (btn) setGuess(+btn.dataset.p, btn.dataset.v === "1");
});

// debug handle (not used by the game itself)
window.__game = { history, get totals() { return totals; }, get cur() { return cur; }, nextFlag, prevFlag, render, startGame };
</script>
</body>
</html>
